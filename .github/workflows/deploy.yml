name: Deploy Demo

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  deploy-demo:
    name: "Deploy Live Demo"
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Download spaCy model
        run: poetry run python -m spacy download en_core_web_sm

      - name: Build static demo files
        run: |
          mkdir -p demo-build
          cp dashboard.html demo-build/
          cp -r Assets demo-build/
          
          # Create demo data
          poetry run python -c "
          from memora import MemoraStore
          store = MemoraStore()
          
          # Add demo memories
          demo_memories = [
              'I prefer Python over JavaScript for backend development',
              'My favorite IDE is VS Code with GitHub Copilot',
              'I work at TechCorp as a Senior Software Engineer',
              'I have 5 years of experience in machine learning',
              'My current project involves building LLM applications',
              'I prefer REST APIs over GraphQL for most use cases',
              'My team uses Poetry for Python dependency management',
              'I enjoy contributing to open source projects',
              'FastAPI is my preferred web framework for Python',
              'I believe in test-driven development practices'
          ]
          
          for memory in demo_memories:
              store.add(memory)
          
          print(f'Added {len(demo_memories)} demo memories')
          "

      - name: Test demo API
        run: |
          # Start server and test it works
          poetry run python -c "
          from memora.interface.server import start_server
          import threading
          import time
          import requests
          
          # Start server in background thread
          server_thread = threading.Thread(
              target=lambda: start_server(host='127.0.0.1', port=8000)
          )
          server_thread.daemon = True
          server_thread.start()
          
          # Wait for server to start
          time.sleep(3)
          
          # Test endpoints
          response = requests.get('http://127.0.0.1:8000/health')
          assert response.status_code == 200
          
          response = requests.get('http://127.0.0.1:8000/memory')
          assert response.status_code == 200
          
          print('✓ Demo API working')
          "

      - name: Create deployment package
        run: |
          # Create a deployment-ready package
          tar -czf memora-demo.tar.gz \
            src/ \
            tests/ \
            pyproject.toml \
            poetry.lock \
            dashboard.html \
            Assets/ \
            README.md

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: memora-demo
          path: memora-demo.tar.gz

  docker-demo:
    name: "Build Docker Demo"
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Create Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM python:3.11-slim
          
          WORKDIR /app
          
          # Install system dependencies
          RUN apt-get update && apt-get install -y \
              curl \
              && rm -rf /var/lib/apt/lists/*
          
          # Install Poetry
          RUN pip install poetry
          
          # Copy project files
          COPY pyproject.toml poetry.lock ./
          COPY src/ ./src/
          COPY dashboard.html ./
          COPY Assets/ ./Assets/
          
          # Install dependencies
          RUN poetry config virtualenvs.create false \
              && poetry install --only=main
          
          # Download spaCy model
          RUN python -m spacy download en_core_web_sm
          
          # Create demo data
          RUN python -c "
          from memora import MemoraStore
          store = MemoraStore()
          
          demo_memories = [
              'Memora is a Git-style versioned memory system for LLMs',
              'This demo shows automatic memory extraction and search',
              'You can add memories through the REST API or web interface',
              'Memories are stored with semantic similarity search',
              'The system handles memory conflicts through branching'
          ]
          
          for memory in demo_memories:
              store.add(memory)
          "
          
          EXPOSE 8000
          
          CMD ["python", "-c", "from memora.interface.server import start_server; start_server(host='0.0.0.0', port=8000)"]
          EOF

      - name: Build Docker image
        run: |
          docker build -t memora-demo .

      - name: Test Docker image
        run: |
          # Start container in background
          docker run -d -p 8000:8000 --name memora-test memora-demo
          
          # Wait for startup
          sleep 10
          
          # Test endpoints
          curl -f http://localhost:8000/health || (echo "Docker health check failed" && exit 1)
          curl -f http://localhost:8000/dashboard || (echo "Docker dashboard failed" && exit 1)
          
          # Cleanup
          docker stop memora-test
          docker rm memora-test

      - name: Save Docker image
        run: |
          docker save memora-demo | gzip > memora-demo-docker.tar.gz

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: memora-demo-docker
          path: memora-demo-docker.tar.gz