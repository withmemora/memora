<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memora - Memory Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .input-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .memory-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .memory-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
            border: 2px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .search-section {
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .memories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .memory-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
            transition: transform 0.3s;
        }

        .memory-card:hover {
            transform: translateY(-5px);
        }

        .memory-text {
            font-size: 1.1em;
            color: #2d3748;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .memory-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .tag {
            background: #e2e8f0;
            color: #64748b;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: 500;
        }

        .tag.confidence {
            background: #dcfce7;
            color: #166534;
        }

        .tag.category {
            background: #fef3c7;
            color: #92400e;
        }

        .tag.entity {
            background: #dbeafe;
            color: #1e40af;
        }

        .timestamp {
            color: #94a3b8;
            font-size: 0.85em;
            margin-left: auto;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Memora</h1>
            <p>Git-style versioned memory for LLMs</p>
        </div>

        <div id="status"></div>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="memoryInput" 
                    class="memory-input" 
                    placeholder="Tell me something about yourself... (e.g., 'My name is John', 'I prefer Python programming')"
                >
                <button onclick="addMemory()" class="btn btn-primary">Add Memory</button>
            </div>
            <div style="font-size: 0.9em; color: #64748b; margin-top: 10px;">
                Tip: Use phrases like "My name is...", "I work at...", "I prefer...", "I live in..." for best extraction
            </div>
        </div>

        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Search memories..."
                onkeyup="searchMemories()"
            >
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalMemories">0</div>
                <div>Total Memories</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="lastAdded">-</div>
                <div>Last Added</div>
            </div>
        </div>

        <div id="memoriesContainer">
            <div class="loading">Loading memories...</div>
        </div>
    </div>

    <script>
        let sessionId = null;
        let allMemories = [];

        // Initialize the dashboard
        async function init() {
            try {
                // Create a session
                const sessionResponse = await fetch('/sessions', {
                    method: 'POST'
                });
                const sessionData = await sessionResponse.json();
                sessionId = sessionData.session_id;
                
                // Load existing memories
                await loadMemories();
                showStatus('Dashboard initialized successfully', 'success');
            } catch (error) {
                showStatus('Failed to initialize dashboard: ' + error.message, 'error');
            }
        }

        // Add a new memory
        async function addMemory() {
            const input = document.getElementById('memoryInput');
            const text = input.value.trim();
            
            if (!text) {
                showStatus('Please enter some text to add as memory', 'error');
                return;
            }

            try {
                const response = await fetch('/memory', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: text,
                        source: 'dashboard'
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    const memoriesCreated = result.data?.memories_created || 0;
                    showStatus(`Added ${memoriesCreated} memories successfully`, 'success');
                    input.value = '';
                    await loadMemories();
                } else {
                    showStatus('Failed to add memory', 'error');
                }
            } catch (error) {
                showStatus('Error adding memory: ' + error.message, 'error');
            }
        }

        // Load and display memories
        async function loadMemories() {
            try {
                const response = await fetch('/memory/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        limit: 100
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    allMemories = result.data?.memories || [];
                    displayMemories(allMemories);
                    updateStats();
                } else {
                    showStatus('Failed to load memories', 'error');
                }
            } catch (error) {
                showStatus('Error loading memories: ' + error.message, 'error');
                document.getElementById('memoriesContainer').innerHTML = 
                    '<div class="error">Failed to load memories</div>';
            }
        }

        // Display memories in the grid
        function displayMemories(memories) {
            const container = document.getElementById('memoriesContainer');
            
            if (memories.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No memories yet</h3>
                        <p>Add your first memory using the input above</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="memories-grid">
                    ${memories.map(memory => createMemoryCard(memory)).join('')}
                </div>
            `;
        }

        // Create a memory card HTML
        function createMemoryCard(memory) {
            const confidence = Math.round((memory.confidence || 0) * 100);
            const timestamp = new Date(memory.created_at).toLocaleDateString();
            
            return `
                <div class="memory-card">
                    <div class="memory-text">${memory.memory}</div>
                    <div class="memory-meta">
                        <span class="tag confidence">${confidence}% confident</span>
                        ${memory.categories?.map(cat => 
                            `<span class="tag category">${cat}</span>`
                        ).join('') || ''}
                        ${memory.entities?.map(entity => 
                            `<span class="tag entity">${entity}</span>`
                        ).join('') || ''}
                        <span class="timestamp">${timestamp}</span>
                    </div>
                </div>
            `;
        }

        // Search memories
        function searchMemories() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                displayMemories(allMemories);
                return;
            }

            const filteredMemories = allMemories.filter(memory =>
                memory.memory.toLowerCase().includes(searchTerm) ||
                memory.categories?.some(cat => cat.toLowerCase().includes(searchTerm)) ||
                memory.entities?.some(entity => entity.toLowerCase().includes(searchTerm))
            );

            displayMemories(filteredMemories);
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalMemories').textContent = allMemories.length;
            
            if (allMemories.length > 0) {
                const latest = allMemories.reduce((latest, memory) => 
                    new Date(memory.created_at) > new Date(latest.created_at) ? memory : latest
                );
                const timeAgo = getTimeAgo(new Date(latest.created_at));
                document.getElementById('lastAdded').textContent = timeAgo;
            } else {
                document.getElementById('lastAdded').textContent = '-';
            }
        }

        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => statusDiv.innerHTML = '', 5000);
        }

        // Get relative time
        function getTimeAgo(date) {
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return `${diffHours}h ago`;
            const diffDays = Math.floor(diffHours / 24);
            return `${diffDays}d ago`;
        }

        // Handle Enter key in input fields
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('memoryInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addMemory();
            });
            
            init();
        });
    </script>
</body>
</html>
# Web dashboard for memory visualization
