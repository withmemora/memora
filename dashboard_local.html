<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memora - Memory Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #000000;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #ffffff;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 4px;
        }

        .header p {
            color: #888;
            font-size: 1.1em;
        }

        .input-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #111;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .memory-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #333;
            border-radius: 10px;
            font-size: 16px;
            background: #000;
            color: #fff;
            transition: border-color 0.3s;
        }

        .memory-input:focus {
            outline: none;
            border-color: #fff;
        }

        .memory-input::placeholder {
            color: #666;
        }

        .btn {
            padding: 12px 24px;
            border: 1px solid #fff;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 1px solid #333;
        }

        .btn-secondary:hover {
            background: #111;
        }

        .branch-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #111;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .branch-section h3 {
            color: #fff;
            margin-bottom: 15px;
            font-weight: 400;
        }

        .branch-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .branch-select {
            padding: 10px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 14px;
            background: #000;
            color: #fff;
            min-width: 200px;
        }

        .current-branch {
            color: #00ff00;
            font-weight: 600;
            padding: 10px 16px;
            background: #111;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .search-section {
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #333;
            border-radius: 10px;
            font-size: 16px;
            background: #000;
            color: #fff;
        }

        .search-input:focus {
            outline: none;
            border-color: #fff;
        }

        .search-input::placeholder {
            color: #666;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .memories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .memory-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s;
        }

        .memory-card:hover {
            transform: translateY(-5px);
            border-color: #555;
        }

        .memory-text {
            font-size: 1.1em;
            color: #fff;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .memory-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .tag {
            background: #222;
            color: #888;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: 500;
        }

        .tag.confidence {
            background: #1a1a1a;
            color: #00ff00;
            border: 1px solid #333;
        }

        .tag.category {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
        }

        .tag.entity {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
        }

        .timestamp {
            color: #666;
            font-size: 0.85em;
            margin-left: auto;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #1a0000;
            color: #ff4444;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ff4444;
        }

        .success {
            background: #001a00;
            color: #00ff00;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #00ff00;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #888;
        }

        .info-text {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MEMORA</h1>
            <p>Git-style versioned memory for LLMs</p>
        </div>

        <div id="status"></div>

        <div class="branch-section">
            <h3>Current Branch</h3>
            <div class="branch-controls">
                <div class="current-branch" id="currentBranch">main</div>
                <select id="branchSelect" class="branch-select" onchange="switchBranch(this.value)">
                    <option value="">Select a branch...</option>
                </select>
                <button onclick="createNewBranch()" class="btn btn-secondary">Create Branch</button>
            </div>
            <p class="info-text">Switch branches to see different memory contexts</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="memoryInput" 
                    class="memory-input" 
                    placeholder="Tell me something about yourself... (e.g., 'My name is John', 'I prefer Python programming')"
                    onkeypress="handleKeyPress(event)"
                >
                <button onclick="addMemory()" class="btn btn-primary">Add Memory</button>
            </div>
            <div class="info-text">
                Tip: Use phrases like "My name is...", "I work at...", "I prefer...", "I live in..." for best extraction
            </div>
        </div>

        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Search memories..."
                onkeyup="searchMemories()"
            >
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalMemories">0</div>
                <div>Total Memories</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="lastAdded">-</div>
                <div>Last Added</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalBranches">1</div>
                <div>Branches</div>
            </div>
        </div>

        <div id="memoriesContainer">
            <div class="loading">Loading memories...</div>
        </div>
    </div>

    <script>
        let sessionId = null;
        let allMemories = [];
        let branches = ['main'];
        let currentBranch = 'main';

        // Initialize the dashboard
        async function init() {
            try {
                // Create a session
                const sessionResponse = await fetch('/sessions', {
                    method: 'POST'
                });
                const sessionData = await sessionResponse.json();
                sessionId = sessionData.session_id;
                
                // Load branches
                await loadBranches();
                
                // Load existing memories
                await loadMemories();
                showStatus('Dashboard initialized successfully', 'success');
            } catch (error) {
                showStatus('Failed to initialize dashboard: ' + error.message, 'error');
            }
        }

        // Load branches
        async function loadBranches() {
            try {
                const response = await fetch('/branches');
                const data = await response.json();
                
                if (data.success && data.data) {
                    branches = data.data.branches || ['main'];
                    updateBranchUI();
                }
            } catch (error) {
                console.log('Using default branch');
            }
        }

        // Update branch UI
        function updateBranchUI() {
            const select = document.getElementById('branchSelect');
            const currentDisplay = document.getElementById('currentBranch');
            const statsBranches = document.getElementById('totalBranches');
            
            select.innerHTML = '<option value="">Select a branch...</option>';
            branches.forEach(branch => {
                const option = document.createElement('option');
                option.value = branch;
                option.textContent = branch;
                if (branch === currentBranch) {
                    option.selected = true;
                }
                select.appendChild(option);
            });
            
            currentDisplay.textContent = currentBranch;
            statsBranches.textContent = branches.length;
        }

        // Switch branch
        async function switchBranch(branchName) {
            if (!branchName || branchName === currentBranch) return;
            
            try {
                const response = await fetch(`/branches/${branchName}`, {
                    method: 'PUT'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentBranch = branchName;
                    updateBranchUI();
                    await loadMemories();
                    showStatus(`Switched to branch: ${branchName}`, 'success');
                } else {
                    showStatus('Failed to switch branch', 'error');
                }
            } catch (error) {
                showStatus('Error switching branch: ' + error.message, 'error');
            }
        }

        // Create new branch
        async function createNewBranch() {
            const branchName = prompt('Enter new branch name:');
            if (!branchName) return;
            
            try {
                const response = await fetch('/branches', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: branchName })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    branches.push(branchName);
                    currentBranch = branchName;
                    updateBranchUI();
                    await loadMemories();
                    showStatus(`Created and switched to branch: ${branchName}`, 'success');
                } else {
                    showStatus('Failed to create branch', 'error');
                }
            } catch (error) {
                showStatus('Error creating branch: ' + error.message, 'error');
            }
        }

        // Add a new memory
        async function addMemory() {
            const input = document.getElementById('memoryInput');
            const text = input.value.trim();
            
            if (!text) {
                showStatus('Please enter some text to add as memory', 'error');
                return;
            }

            try {
                const response = await fetch('/memory', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: text,
                        source: 'dashboard',
                        branch: currentBranch
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    const memoriesCreated = result.data?.memories_created || 0;
                    showStatus(`Added ${memoriesCreated} memories successfully to ${currentBranch}`, 'success');
                    input.value = '';
                    await loadMemories();
                } else {
                    showStatus('Failed to add memory', 'error');
                }
            } catch (error) {
                showStatus('Error adding memory: ' + error.message, 'error');
            }
        }

        // Load and display memories
        async function loadMemories() {
            try {
                const response = await fetch('/memory/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        branch: currentBranch,
                        limit: 100
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    allMemories = result.data?.memories || [];
                    displayMemories(allMemories);
                    updateStats();
                } else {
                    showStatus('Failed to load memories', 'error');
                }
            } catch (error) {
                showStatus('Error loading memories: ' + error.message, 'error');
                document.getElementById('memoriesContainer').innerHTML = 
                    '<div class="error">Failed to load memories</div>';
            }
        }

        // Display memories in the grid
        function displayMemories(memories) {
            const container = document.getElementById('memoriesContainer');
            
            if (memories.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No memories yet</h3>
                        <p>Add your first memory using the input above</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="memories-grid">
                    ${memories.map(memory => createMemoryCard(memory)).join('')}
                </div>
            `;
        }

        // Create a memory card HTML
        function createMemoryCard(memory) {
            const confidence = Math.round((memory.confidence || 0) * 100);
            const timestamp = new Date(memory.created_at).toLocaleDateString();
            
            return `
                <div class="memory-card">
                    <div class="memory-text">${escapeHtml(memory.memory || memory.content || '')}</div>
                    <div class="memory-meta">
                        <span class="tag confidence">${confidence}% confident</span>
                        ${memory.categories?.map(cat => 
                            `<span class="tag category">${escapeHtml(cat)}</span>`
                        ).join('') || ''}
                        ${memory.entities?.map(entity => 
                            `<span class="tag entity">${escapeHtml(entity)}</span>`
                        ).join('') || ''}
                        <span class="timestamp">${timestamp}</span>
                    </div>
                </div>
            `;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Search memories
        function searchMemories() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                displayMemories(allMemories);
                return;
            }

            const filteredMemories = allMemories.filter(memory =>
                (memory.memory || memory.content || '').toLowerCase().includes(searchTerm) ||
                memory.categories?.some(cat => cat.toLowerCase().includes(searchTerm)) ||
                memory.entities?.some(entity => entity.toLowerCase().includes(searchTerm))
            );

            displayMemories(filteredMemories);
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalMemories').textContent = allMemories.length;
            
            if (allMemories.length > 0) {
                const latest = allMemories.reduce((latest, memory) => 
                    new Date(memory.created_at) > new Date(latest.created_at) ? memory : latest
                );
                const timeAgo = getTimeAgo(new Date(latest.created_at));
                document.getElementById('lastAdded').textContent = timeAgo;
            } else {
                document.getElementById('lastAdded').textContent = '-';
            }
        }

        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => statusDiv.innerHTML = '', 5000);
        }

        // Get relative time
        function getTimeAgo(date) {
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return `${diffHours}h ago`;
            const diffDays = Math.floor(diffHours / 24);
            return `${diffDays}d ago`;
        }

        // Handle Enter key in input fields
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                addMemory();
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            init();
        });
    </script>
</body>
</html>
