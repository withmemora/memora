<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memora</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: #000; color: #fff; min-height: 100vh; line-height: 1.6; font-size: 14px; }
        a { color: #fff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .app { display: flex; min-height: 100vh; }

        .sidebar { width: 180px; border-right: 1px solid #fff; padding: 20px 0; flex-shrink: 0; }
        .sidebar h1 { font-size: 14px; font-weight: 700; padding: 0 20px 20px; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid #fff; margin-bottom: 0; }
        .nav-item { padding: 8px 20px; cursor: pointer; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; transition: background 0.1s; }
        .nav-item:hover { background: #fff; color: #000; }
        .nav-item.active { background: #fff; color: #000; }

        .main { flex: 1; padding: 30px; overflow-y: auto; max-height: 100vh; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #fff; }
        .header h2 { font-size: 14px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
        .header-actions { display: flex; gap: 10px; }
        .btn { padding: 6px 14px; border: 1px solid #fff; background: #000; color: #fff; cursor: pointer; font-size: 11px; font-family: inherit; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.1s; }
        .btn:hover { background: #fff; color: #000; }

        .stats-row { display: flex; gap: 0; margin-bottom: 30px; border: 1px solid #fff; }
        .stat-card { flex: 1; padding: 15px; border-right: 1px solid #fff; text-align: center; }
        .stat-card:last-child { border-right: none; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; opacity: 0.6; }

        .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid #fff; }
        .panel { padding: 20px; border-right: 1px solid #fff; border-bottom: 1px solid #fff; }
        .panel:nth-child(even) { border-right: none; }
        .panel:nth-last-child(-n+2) { border-bottom: none; }
        .panel h3 { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #fff; }

        .profile-card { display: flex; flex-direction: column; gap: 10px; }
        .profile-row { display: flex; gap: 10px; align-items: baseline; }
        .profile-label { opacity: 0.6; font-size: 12px; min-width: 80px; text-transform: uppercase; letter-spacing: 0.05em; }
        .profile-value { font-size: 13px; }
        .profile-value .tag { display: inline-block; border: 1px solid #fff; padding: 1px 8px; font-size: 11px; margin: 2px 4px 2px 0; }

        .memory-timeline { display: flex; flex-direction: column; gap: 0; max-height: 350px; overflow-y: auto; }
        .session-header { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.6; padding: 10px 0 6px; border-bottom: 1px solid #333; }
        .memory-item { padding: 8px 0; border-bottom: 1px solid #222; }
        .memory-item:last-child { border-bottom: none; }
        .memory-content { font-size: 13px; }
        .memory-meta { font-size: 10px; opacity: 0.4; margin-top: 3px; letter-spacing: 0.05em; }

        .branch-bar { width: 100%; height: 4px; background: #222; margin: 8px 0; }
        .branch-fill { height: 100%; background: #fff; transition: width 0.3s; }
        .branch-info { font-size: 12px; opacity: 0.6; }
        .branch-info span { color: #fff; font-weight: 700; }

        .graph-container { min-height: 150px; }
        .graph-node { display: inline-block; border: 1px solid #fff; padding: 2px 10px; font-size: 11px; margin: 3px; letter-spacing: 0.03em; }
        .graph-edges { margin-top: 12px; font-size: 11px; opacity: 0.6; }
        .graph-edge { padding: 3px 0; }
        .graph-edge .relation { color: #fff; font-weight: 700; }

        .empty-state { text-align: center; padding: 30px 10px; opacity: 0.4; }
        .empty-state p { margin-top: 6px; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; }
        .loading { text-align: center; padding: 15px; opacity: 0.4; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #fff; }

        @media (max-width: 800px) { .panels { grid-template-columns: 1fr; } .sidebar { width: 50px; } .sidebar h1, .nav-item span { display: none; } .stat-card { padding: 10px 5px; } .stat-value { font-size: 18px; } }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <h1>Memora</h1>
            <div class="nav-item active" onclick="showPanel('dashboard')"><span>Dashboard</span></div>
            <div class="nav-item" onclick="showPanel('memories')"><span>Memories</span></div>
            <div class="nav-item" onclick="showPanel('sessions')"><span>Sessions</span></div>
            <div class="nav-item" onclick="showPanel('branches')"><span>Branches</span></div>
            <div class="nav-item" onclick="showPanel('graph')"><span>Graph</span></div>
            <div class="nav-item" onclick="showPanel('commits')"><span>Commits</span></div>
        </div>
        <div class="main" id="main-content">
            <div class="header">
                <h2>Dashboard</h2>
                <div class="header-actions">
                    <button class="btn" onclick="exportMemories('md')">Export MD</button>
                    <button class="btn" onclick="exportMemories('json')">Export JSON</button>
                    <button class="btn" onclick="refreshAll()">Refresh</button>
                </div>
            </div>
            <div class="stats-row" id="stats-row"></div>
            <div class="panels">
                <div class="panel">
                    <h3>Profile</h3>
                    <div id="profile-content"><div class="loading">Loading...</div></div>
                </div>
                <div class="panel">
                    <h3>Timeline</h3>
                    <div id="timeline-content"><div class="loading">Loading...</div></div>
                </div>
                <div class="panel">
                    <h3>Branch</h3>
                    <div id="branch-content"><div class="loading">Loading...</div></div>
                </div>
                <div class="panel">
                    <h3>Graph</h3>
                    <div id="graph-content"><div class="loading">Loading...</div></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API = '';
        async function api(path) {
            const r = await fetch(`${API}${path}`);
            if (!r.ok) throw new Error(`${path}: ${r.status}`);
            return r.json();
        }

        async function refreshAll() {
            await Promise.all([loadStats(), loadProfile(), loadTimeline(), loadBranch(), loadGraph()]);
        }

        async function loadStats() {
            try {
                const d = await api('/stats');
                const s = d.data;
                document.getElementById('stats-row').innerHTML = `
                    <div class="stat-card"><div class="stat-value">${s.total_memories}</div><div class="stat-label">Memories</div></div>
                    <div class="stat-card"><div class="stat-value">${s.total_commits}</div><div class="stat-label">Commits</div></div>
                    <div class="stat-card"><div class="stat-value">${s.total_sessions}</div><div class="stat-label">Sessions</div></div>
                    <div class="stat-card"><div class="stat-value">${s.current_branch}</div><div class="stat-label">Branch</div></div>
                `;
            } catch(e) { console.error('Stats:', e); }
        }

        async function loadProfile() {
            try {
                const d = await api('/graph/profile');
                const p = d.profile;
                let html = '<div class="profile-card">';
                if (p.works_at?.length) html += row('Works at', p.works_at);
                if (p.languages?.length) html += row('Languages', p.languages);
                if (p.tools?.length) html += row('Tools', p.tools);
                if (p.knows?.length) html += row('Knows', p.knows);
                if (p.building?.length) html += row('Building', p.building);
                if (p.considering?.length) html += row('Considering', p.considering);
                if (!p.works_at?.length && !p.languages?.length && !p.knows?.length && !p.building?.length && !p.tools?.length)
                    html = '<div class="empty-state"><p>No profile data yet</p><p>Chat with Ollama to build your profile</p></div>';
                html += '</div>';
                document.getElementById('profile-content').innerHTML = html;
            } catch(e) { document.getElementById('profile-content').innerHTML = '<div class="empty-state"><p>Graph unavailable</p></div>'; }
        }

        function row(label, items) {
            return `<div class="profile-row"><span class="profile-label">${label}</span><span class="profile-value">${items.map(x => `<span class="tag">${esc(x)}</span>`).join('')}</span></div>`;
        }

        async function loadTimeline() {
            try {
                const d = await api('/memory/timeline');
                const memories = d.timeline || [];
                if (!memories.length) { document.getElementById('timeline-content').innerHTML = '<div class="empty-state"><p>No memories yet</p><p>Chat with Ollama to start capturing</p></div>'; return; }
                let html = '<div class="memory-timeline">';
                let currentDate = '';
                memories.slice(0, 30).forEach(m => {
                    const date = m.created_at?.slice(0, 10) || '';
                    if (date !== currentDate) { html += `<div class="session-header">${date}</div>`; currentDate = date; }
                    html += `<div class="memory-item"><div class="memory-content">${esc(m.content)}</div><div class="memory-meta">${m.confidence ? m.confidence.toFixed(2) + '  ' : ''}${m.source || ''}</div></div>`;
                });
                html += '</div>';
                document.getElementById('timeline-content').innerHTML = html;
            } catch(e) { document.getElementById('timeline-content').innerHTML = '<div class="empty-state"><p>Timeline unavailable</p></div>'; }
        }

        async function loadBranch() {
            try {
                const d = await api('/branches/status');
                const branches = d.branches || [];
                if (!branches.length) { document.getElementById('branch-content').innerHTML = '<div class="empty-state"><p>No branches yet</p></div>'; return; }
                let html = '';
                branches.forEach(b => {
                    const isCurrent = b.name === d.current_branch;
                    html += `<div style="margin-bottom:16px">`;
                    html += `<div style="font-weight:700;font-size:12px;letter-spacing:0.05em;text-transform:uppercase">${b.name} ${isCurrent ? '<span style="opacity:0.5">(current)</span>' : ''}</div>`;
                    html += `<div class="branch-bar"><div class="branch-fill" style="width:${b.session_pct}%"></div></div>`;
                    html += `<div class="branch-info"><span>${b.session_count}</span> / ${b.session_limit} sessions  ·  <span>${b.memory_count}</span> / ${b.memory_limit} memories</div>`;
                    html += `<div class="branch-info" style="margin-top:4px">Status: ${b.status}</div>`;
                    html += `</div>`;
                });
                document.getElementById('branch-content').innerHTML = html;
            } catch(e) { document.getElementById('branch-content').innerHTML = '<div class="empty-state"><p>Branch info unavailable</p></div>'; }
        }

        async function loadGraph() {
            try {
                const d = await api('/graph/nodes');
                const nodes = d.nodes || [];
                const edges = await api('/graph/edges');
                const edgeList = edges.edges || [];
                if (!nodes.length) { document.getElementById('graph-content').innerHTML = '<div class="empty-state"><p>No graph data yet</p><p>NER entities will appear here</p></div>'; return; }
                let html = '<div class="graph-container">';
                html += '<div>';
                nodes.slice(0, 20).forEach(n => { html += `<span class="graph-node">${esc(n.name)}</span>`; });
                html += '</div>';
                if (edgeList.length) {
                    html += '<div class="graph-edges">';
                    edgeList.slice(0, 10).forEach(e => {
                        if (!e.superseded_at) html += `<div class="graph-edge">${esc(e.source)} <span class="relation">--${esc(e.relation)}--></span> ${esc(e.target)}</div>`;
                    });
                    html += '</div>';
                }
                html += '</div>';
                document.getElementById('graph-content').innerHTML = html;
            } catch(e) { document.getElementById('graph-content').innerHTML = '<div class="empty-state"><p>Graph unavailable</p></div>'; }
        }

        async function exportMemories(format) {
            try {
                const d = await api(`/memory/export?format=${format}`);
                const blob = new Blob([d.data], {type: format === 'json' ? 'application/json' : 'text/markdown'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `memora-export.${format === 'json' ? 'json' : 'md'}`;
                a.click();
            } catch(e) { alert('Export failed: ' + e.message); }
        }

        function showPanel(panel) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        refreshAll();
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
